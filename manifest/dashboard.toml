# meta mission-control dashboard (yazelix/zellij layout + per-pane launcher).
#
# Two pieces, both user-scoped (NO sudo — mirrors the no-sudo posture of the rest
# of the env stack):
#   1. the `envctl-dashboard-pane` launcher on PATH (~/.local/bin), which each
#      generated pane's `command=` resolves;
#   2. the `envctl-open-claude` helper on PATH (~/.local/bin), which a human runs
#      inside a pane to start an idle `claude` session; and
#   3. the generated `mission-control.kdl` zellij layout, deployed via the
#      fail-closed engine path (`envctl dashboard --deploy --apply`).
#
# Requires the yazelix stack (the layout targets yazelix's zellij layouts dir) and
# the claude-code CLI (the launcher can `exec` an idle `claude` per pane when
# explicitly requested). The layout generator READS `.meta.yaml` at runtime — no
# repos are hardcoded, so this stays in lockstep with the `meta dashboard` plugin
# surface.

[[component]]
id = "dashboard"
name = "meta mission-control dashboard"
description = "Install the dashboard pane launcher and human-triggered Claude opener (~/.local/bin) + deploy the generated zellij mission-control layout for yazelix."
requires = ["yazelix", "claude-code-cli"]

# Present iff the generated layout file exists AND the launcher is on PATH.
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "test -f \"${XDG_CONFIG_HOME:-$HOME/.config}/yazelix/configs/zellij/layouts/mission-control.kdl\" && command -v envctl-dashboard-pane >/dev/null && command -v envctl-open-claude >/dev/null"]

# Install: put the launcher on PATH (~/.local/bin, install -D -m755 from the repo
# assets), then deploy the layout via the fail-closed engine path. Idempotent:
# install -D overwrites the launcher; `--deploy --apply` backs up + rewrites the
# envctl-owned layout. cwd-independent: ROOT derived from the manifest dir.
[component.install]
kind = "script"
login_shell = true
script = '''
set -e
ROOT="$(cd "${ENVCTL_MANIFEST_DIR:-./manifest}/.." && pwd)"
install -D -m 755 "$ROOT/assets/scripts/envctl-dashboard-pane" "$HOME/.local/bin/envctl-dashboard-pane"
install -D -m 755 "$ROOT/assets/scripts/envctl-open-claude" "$HOME/.local/bin/envctl-open-claude"
ENVCTL="$(command -v envctl || echo "$ROOT/target/release/envctl")"
[ -x "$ENVCTL" ] || ENVCTL="$ROOT/target/debug/envctl"
"$ENVCTL" dashboard --deploy --apply
'''

# Verify: launcher resolves on PATH and the layout file is the envctl-owned one.
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "command -v envctl-dashboard-pane >/dev/null && command -v envctl-open-claude >/dev/null && grep -q 'Generated by envctl dashboard' \"${XDG_CONFIG_HOME:-$HOME/.config}/yazelix/configs/zellij/layouts/mission-control.kdl\""]

# Idempotent repair: reinstall the launcher and regenerate the layout.
[component.fix]
kind = "script"
login_shell = true
script = '''
set -e
ROOT="$(cd "${ENVCTL_MANIFEST_DIR:-./manifest}/.." && pwd)"
install -D -m 755 "$ROOT/assets/scripts/envctl-dashboard-pane" "$HOME/.local/bin/envctl-dashboard-pane"
install -D -m 755 "$ROOT/assets/scripts/envctl-open-claude" "$HOME/.local/bin/envctl-open-claude"
ENVCTL="$(command -v envctl || echo "$ROOT/target/release/envctl")"
[ -x "$ENVCTL" ] || ENVCTL="$ROOT/target/debug/envctl"
"$ENVCTL" dashboard --deploy --apply
'''

# Remove: revert the layout (restore the most recent envctl backup if one exists,
# else delete the envctl-owned file — foreign files are left alone), then remove
# the launcher from ~/.local/bin.
[component.remove]
kind = "script"
login_shell = true
script = '''
set -e
LAYOUT="${XDG_CONFIG_HOME:-$HOME/.config}/yazelix/configs/zellij/layouts/mission-control.kdl"
if [ -f "$LAYOUT" ] && grep -q 'Generated by envctl dashboard' "$LAYOUT"; then
  BAK="$(ls -1t "$LAYOUT".bak.* 2>/dev/null | head -n1 || true)"
  if [ -n "$BAK" ]; then
    mv -f "$BAK" "$LAYOUT"
  else
    rm -f "$LAYOUT"
  fi
fi
rm -f "$HOME/.local/bin/envctl-dashboard-pane"
rm -f "$HOME/.local/bin/envctl-open-claude"
'''
