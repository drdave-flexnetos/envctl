name: sync-master

# Keep `master` as a PROTECTED mirror of `develop`: every push to develop fast-forwards
# master. develop is the integration/working trunk; master is the protected release mirror
# (a branch ruleset blocks all human pushes/PRs — see the master-mirror ruleset).
#
# The fast-forward push is made with a token minted from the `flexnetos-github-app` GitHub
# App (org secrets APP_ID + APP_PRIVATE_KEY — the same proven pattern as icm/hermes-agent).
# The App is the ruleset's sole bypass actor, so the sync FFs master while humans stay blocked.
# GITHUB_TOKEN is NOT used for the push: it is github-actions[bot], which cannot be a ruleset
# bypass actor and would be blocked by the protection.
#
# NO-DOWNGRADE: the push is fast-forward-only (never --force). If master ever diverges from
# develop, the guard refuses and the job FAILS LOUDLY rather than rewriting history.

on:
  push:
    branches: [develop]
  workflow_dispatch: {}

permissions:
  contents: read   # the App token does the writing; the default token stays read-only

concurrency:
  group: sync-master
  cancel-in-progress: false

jobs:
  ff-master:
    runs-on: ubuntu-latest
    steps:
      - name: Mint flexnetos-github-app token (the ruleset bypass identity)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout (full history, authenticated as the App)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Fast-forward master to develop
        run: |
          set -euo pipefail
          git config user.name  "flexnetos-github-app[bot]"
          git config user.email "flexnetos-github-app[bot]@users.noreply.github.com"
          # develop must be a strict descendant of master (no-downgrade invariant).
          if git merge-base --is-ancestor origin/master origin/develop; then
            git push origin "origin/develop:refs/heads/master"
            echo "master fast-forwarded to $(git rev-parse --short origin/develop)"
          else
            echo "::error::develop is not a fast-forward of master — refusing to sync (would not be a clean promotion)."
            exit 1
          fi
