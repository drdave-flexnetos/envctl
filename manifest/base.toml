# Core dev base: fonts, JS runtime (+ node-via-bun), Rust toolchain, rtk.
# Maps yazelix-setup.sh sections 1-3.

[[component]]
id = "nerd-fonts"
name = "Nerd Fonts (JetBrainsMono, FiraCode)"
description = "Patched fonts for the terminal/editor UI."
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "fc-list 2>/dev/null | grep -qiE 'JetBrainsMono Nerd|FiraCode Nerd'"]
[component.install]
kind = "script"
script = '''
set -e
FD="$HOME/.local/share/fonts"; mkdir -p "$FD"; cd "$(mktemp -d)"
base="https://github.com/ryanoasis/nerd-fonts/releases/latest/download"
for f in JetBrainsMono FiraCode; do
  curl -fsSL -o "$f.zip" "$base/$f.zip"
  unzip -oq "$f.zip" -d "$FD/$f-NerdFont"
done
fc-cache -f >/dev/null
'''
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "fc-list | grep -qiE 'JetBrainsMono Nerd Font|FiraCode Nerd Font'"]
[component.remove]
kind = "command"
command = "bash"
args = ["-lc", "rm -rf \"$HOME/.local/share/fonts/JetBrainsMono-NerdFont\" \"$HOME/.local/share/fonts/FiraCode-NerdFont\"; fc-cache -f >/dev/null"]


[[component]]
id = "bun"
name = "Bun JS runtime"
description = "JS runtime + package manager; provides node via a bun symlink."
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "command -v bun || [ -x \"$HOME/.bun/bin/bun\" ]"]
[component.install]
kind = "script"
script = "curl -fsSL https://bun.sh/install | bash"
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.bun/bin:$PATH\"; bun --version"]
[component.fix]
kind = "script"
script = "curl -fsSL https://bun.sh/install | bash"
[component.remove]
kind = "command"
command = "bash"
args = ["-lc", "rm -rf \"$HOME/.bun\""]
[component.wiring]
path_entries = ["~/.bun/bin", "~/.local/bin"]
[[component.wiring.shell_rc]]
file = "~/.bashrc"
marker = "bun path"
content = 'export PATH="$HOME/.bun/bin:$HOME/.local/bin:$PATH"'


[[component]]
id = "node-via-bun"
name = "node → bun symlink"
description = "Exposes `node` as a symlink to bun (node-compat mode)."
requires = ["bun"]
[component.detect]
kind = "command"
command = "bash"
# Truthful: node-compat is satisfied if EITHER ~/.bun/bin/node points at bun
# (the bun node shim) OR a real `node` resolves on PATH. On an n8n box the real
# node (~/.local/bin/node) precedes the inert bun symlink — that still counts.
args = ["-lc", "{ [ -x \"$HOME/.bun/bin/node\" ] && readlink -f \"$HOME/.bun/bin/node\" 2>/dev/null | grep -q bun; } || command -v node >/dev/null"]
[component.install]
kind = "command"
command = "bash"
args = ["-lc", "ln -sf \"$(command -v bun || echo \"$HOME/.bun/bin/bun\")\" \"$HOME/.bun/bin/node\""]
[component.verify]
kind = "command"
command = "bash"
# Bun's node shim runs `node <script>` but NOT `node --version`. A real node also
# runs `node -e`. So `node -e` is the honest node-compat smoke test for BOTH
# runtimes. Prefer a real node if one is on PATH; else fall back to the bun shim.
args = ["-lc", "export PATH=\"$HOME/.bun/bin:$PATH\"; node -e 'process.exit(0)'"]
[component.fix]
kind = "command"
command = "bash"
args = ["-lc", "ln -sf \"$HOME/.bun/bin/bun\" \"$HOME/.bun/bin/node\""]
[component.remove]
kind = "command"
command = "bash"
args = ["-lc", "rm -f \"$HOME/.bun/bin/node\""]


[[component]]
id = "node-real"
name = "Real Node.js (n8n V8 runtime)"
description = "Real Node 20-24 for tools that need V8 (n8n's isolated-vm). Bun (JSC) cannot satisfy these; this is the narrow non-bun carve-out. Bun remains the default JS runtime."
[component.detect]
kind = "command"
command = "bash"
# A REAL node (not the bun shim) in n8n's supported range 20-24.
args = ["-lc", "command -v node >/dev/null && ! readlink -f \"$(command -v node)\" 2>/dev/null | grep -q bun && node -e 'const m=+process.versions.node.split(\".\")[0]; process.exit(m>=20 && m<=24 ? 0 : 1)'"]
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "node -e 'const m=+process.versions.node.split(\".\")[0]; process.exit(m>=20 && m<=24 ? 0 : 1)'"]
[component.install]
kind = "script"
# Install a real Node 22 LTS into ~/.local without touching bun. nvm-free, no sudo.
script = '''
set -e
VER=v22.22.3
ARCH="$(uname -m)"; case "$ARCH" in x86_64) A=x64;; aarch64) A=arm64;; *) A="$ARCH";; esac
cd "$(mktemp -d)"
curl -fsSL -o node.tar.xz "https://nodejs.org/dist/$VER/node-$VER-linux-$A.tar.xz"
mkdir -p "$HOME/.local"
tar -xJf node.tar.xz --strip-components=1 -C "$HOME/.local"
'''
[component.fix]
kind = "script"
script = '''
set -e
VER=v22.22.3
ARCH="$(uname -m)"; case "$ARCH" in x86_64) A=x64;; aarch64) A=arm64;; *) A="$ARCH";; esac
cd "$(mktemp -d)"
curl -fsSL -o node.tar.xz "https://nodejs.org/dist/$VER/node-$VER-linux-$A.tar.xz"
mkdir -p "$HOME/.local"
tar -xJf node.tar.xz --strip-components=1 -C "$HOME/.local"
'''
# NOTE: no `remove` hook by design — n8n depends on real node; removal is not a
# managed operation here (avoids a footgun that would break n8n).
[component.wiring]
path_entries = ["~/.local/bin"]


[[component]]
id = "rustup"
name = "rustup toolchain"
description = "Rust toolchain manager (cargo/rustc). Foundation for rtk + cuda-oxide."
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "command -v cargo || command -v rustup || [ -x \"$HOME/.cargo/bin/cargo\" ]"]
[component.install]
kind = "script"
script = "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.cargo/bin:$PATH\"; rustc --version && cargo --version"]
[component.fix]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.cargo/bin:$PATH\"; rustup self update; rustup update stable"]
[component.remove]
kind = "command"
command = "bash"
args = ["-lc", "\"$HOME/.cargo/bin/rustup\" self uninstall -y"]


[[component]]
id = "rtk"
name = "rtk (Rust Token Killer)"
description = "cargo-installed CLI; first run: rtk gain ; rtk init -g."
requires = ["rustup"]
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "command -v rtk || [ -x \"$HOME/.local/bin/rtk\" ] || [ -x \"$HOME/.cargo/bin/rtk\" ]"]
[component.install]
kind = "script"
script = "export PATH=\"$HOME/.cargo/bin:$PATH\"; cargo install --git https://github.com/rtk-ai/rtk"
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.cargo/bin:$PATH\"; rtk --version"]
[component.fix]
kind = "script"
script = "export PATH=\"$HOME/.cargo/bin:$PATH\"; cargo install --force --git https://github.com/rtk-ai/rtk"
[component.remove]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.cargo/bin:$PATH\"; cargo uninstall rtk"]
