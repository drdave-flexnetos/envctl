name: sync-master

# Keep `master` as a mirror of `develop`: every push to develop fast-forwards master.
# develop is the integration/working trunk; master is the release mirror.
#
# NOTE: master protection (a ruleset blocking human pushes/PRs) is PENDING — it requires the
# fast-forward push to be made by an identity that can bypass the ruleset, since GITHUB_TOKEN
# (github-actions[bot]) cannot be a bypass actor. The intended identity is the
# `flexnetos-github-app` GitHub App (org secrets APP_ID/APP_CLIENT_ID + APP_PRIVATE_KEY), but
# those org secrets are not yet visible to THIS repo. Until envctl is added to their repository
# access list, this workflow uses GITHUB_TOKEN and master stays unprotected.
#
# NO-DOWNGRADE: fast-forward-only (never --force). Fails closed if master diverges from develop.

on:
  push:
    branches: [develop]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-master
  cancel-in-progress: false

jobs:
  ff-master:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward master to develop
        run: |
          set -euo pipefail
          git config user.name  "flexnetos-sync[bot]"
          git config user.email "sync@flexnetos.local"
          if git merge-base --is-ancestor origin/master origin/develop; then
            git push origin "origin/develop:refs/heads/master"
            echo "master fast-forwarded to $(git rev-parse --short origin/develop)"
          else
            echo "::error::develop is not a fast-forward of master — refusing to sync."
            exit 1
          fi
