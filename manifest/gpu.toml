# GPU / CUDA stack (yazelix-setup.sh section 3b + 3f). All gpu_required: the whole
# set auto-skips (with reason) on a non-NVIDIA box. CUDA 13.3 + nvidia-open 610,
# cuda-oxide, container toolkit + CDI, PyTorch cu132. nvidia-open verify is
# reboot-gated (nvidia-smi only goes live after a reboot).

[[component]]
id = "nvidia-cuda-repo"
name = "NVIDIA CUDA apt repo"
description = "cuda-keyring + ubuntu2604 sources; foundation for the toolkit/driver."
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "ls /etc/apt/sources.list.d/cuda*.list >/dev/null 2>&1 || dpkg -l cuda-keyring 2>/dev/null | grep -q '^ii'"]
[component.install]
kind = "script"
script = '''
set -e
cd "$(mktemp -d)"
curl -fsSLO https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2604/x86_64/cuda-keyring_1.1-1_all.deb
sudo dpkg -i cuda-keyring_1.1-1_all.deb
sudo apt-get update -y
'''
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "apt-cache policy cuda-toolkit-13-3 2>/dev/null | grep -q developer.download.nvidia.com"]
[component.remove]
kind = "script"
script = "sudo dpkg -P cuda-keyring; sudo rm -f /etc/apt/sources.list.d/cuda-ubuntu2604-x86_64.list; sudo apt-get update -y"


[[component]]
id = "cuda-toolkit"
name = "CUDA toolkit 13.3"
description = "cuda-toolkit-13-3 (version-locked); owns the cuda env shell block."
requires = ["nvidia-cuda-repo"]
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "command -v nvcc >/dev/null || dpkg -l cuda-toolkit-13-3 2>/dev/null | grep -q '^ii'"]
[component.install]
kind = "command"
needs_sudo = true
command = "apt-get"
args = ["install", "-y", "cuda-toolkit-13-3"]
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "CUDA_HOME=/usr/local/cuda; [ -d \"$CUDA_HOME/bin\" ] || CUDA_HOME=\"$(ls -d /usr/local/cuda-* 2>/dev/null | sort -V | tail -n1)\"; \"$CUDA_HOME/bin/nvcc\" --version"]
[component.fix]
kind = "command"
needs_sudo = true
command = "apt-get"
args = ["install", "--reinstall", "-y", "cuda-toolkit-13-3"]
[component.remove]
kind = "script"
script = "sudo apt-get remove -y cuda-toolkit-13-3 && sudo apt-get autoremove -y"
[component.wiring]
path_entries = ["/usr/local/cuda/bin"]
[[component.wiring.shell_rc]]
file = "~/.bashrc"
marker = "cuda env"
# Resolve CUDA_HOME dynamically (cuda-toolkit-13-3 installs to /usr/local/cuda-13.3
# and does NOT guarantee the unversioned /usr/local/cuda symlink) — mirrors the
# wizard (yazelix-setup.sh L134-135) and this component's own verify.
content = '''
CUDA_HOME=/usr/local/cuda; [ -d "$CUDA_HOME/bin" ] || CUDA_HOME="$(ls -d /usr/local/cuda-* 2>/dev/null | sort -V | tail -n1)"
export PATH="$CUDA_HOME/bin:$PATH"
export LD_LIBRARY_PATH="$CUDA_HOME/lib64:${LD_LIBRARY_PATH:-}"
export CUDA_OXIDE_LLC="$(command -v llc-22 || command -v llc-21 || ls /usr/lib/llvm-2*/bin/llc 2>/dev/null | sort -V | tail -n1)"
'''


[[component]]
id = "nvidia-open"
name = "nvidia-open 610 driver"
description = "GA-matched OPEN kernel modules for Blackwell sm_120. REBOOT to load."
requires = ["nvidia-cuda-repo"]
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "dpkg -l nvidia-open 2>/dev/null | grep -q '^ii' || (command -v nvidia-smi >/dev/null && nvidia-smi -L >/dev/null 2>&1)"]
[component.install]
kind = "command"
needs_sudo = true
command = "apt-get"
args = ["install", "-y", "nvidia-open"]
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "command -v nvidia-smi >/dev/null && nvidia-smi -L >/dev/null 2>&1"]
[component.fix]
kind = "command"
needs_sudo = true
command = "apt-get"
args = ["install", "--reinstall", "-y", "nvidia-open"]
[component.remove]
kind = "script"
script = "sudo apt-get remove -y nvidia-open && sudo apt-get autoremove -y"


[[component]]
id = "llvm-clang"
name = "LLVM 21 + clang-21 + libclang dev"
description = "Provides llc + libclang resource-dir headers cuda-oxide's bindgen needs."
requires = ["nvidia-cuda-repo"]
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "command -v clang-21 >/dev/null && (command -v llc-21 >/dev/null || command -v llc-22 >/dev/null || ls /usr/lib/llvm-2*/bin/llc >/dev/null 2>&1)"]
[component.install]
kind = "command"
needs_sudo = true
command = "apt-get"
args = ["install", "-y", "llvm-21", "llvm-21-tools", "clang-21", "libclang-21-dev", "libclang-cpp21-dev", "libclang-common-21-dev"]
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "clang-21 --version"]
[component.remove]
kind = "script"
script = "sudo apt-get remove -y llvm-21 llvm-21-tools clang-21 libclang-21-dev libclang-cpp21-dev libclang-common-21-dev && sudo apt-get autoremove -y"


[[component]]
id = "rust-nightly-cuda-oxide"
name = "Rust nightly + components (cuda-oxide)"
description = "Pinned nightly-2026-04-03 + rust-src/rustc-dev/llvm-tools."
requires = ["rustup"]
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.cargo/bin:$PATH\"; rustup toolchain list 2>/dev/null | grep -q nightly-2026-04-03"]
[component.install]
kind = "script"
script = "export PATH=\"$HOME/.cargo/bin:$PATH\"; rustup toolchain install nightly-2026-04-03; rustup component add rust-src rustc-dev llvm-tools --toolchain nightly-2026-04-03"
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.cargo/bin:$PATH\"; rustup component list --toolchain nightly-2026-04-03 --installed | grep -q rust-src"]
[component.fix]
kind = "script"
script = "export PATH=\"$HOME/.cargo/bin:$PATH\"; rustup component add rust-src rustc-dev llvm-tools --toolchain nightly-2026-04-03"
[component.remove]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.cargo/bin:$PATH\"; rustup toolchain uninstall nightly-2026-04-03"]


[[component]]
id = "cuda-oxide"
name = "cuda-oxide (cargo-oxide)"
requires = ["rust-nightly-cuda-oxide", "cuda-toolkit", "llvm-clang", "nvidia-open"]
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "command -v cargo-oxide || [ -x \"$HOME/.cargo/bin/cargo-oxide\" ]"]
[component.install]
kind = "script"
script = "export PATH=\"$HOME/.cargo/bin:$PATH\"; cargo install --git https://github.com/NVlabs/cuda-oxide.git cargo-oxide"
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.cargo/bin:$PATH\"; cargo-oxide --version"]
[component.fix]
kind = "script"
script = "export PATH=\"$HOME/.cargo/bin:$PATH\"; cargo install --force --git https://github.com/NVlabs/cuda-oxide.git cargo-oxide"
[component.remove]
kind = "command"
command = "bash"
args = ["-lc", "export PATH=\"$HOME/.cargo/bin:$PATH\"; cargo uninstall cargo-oxide"]


[[component]]
id = "nvidia-container-toolkit"
name = "NVIDIA Container Toolkit + CDI"
description = "Rootless Podman GPU via --device nvidia.com/gpu=all."
requires = ["nvidia-open", "podman"]
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "command -v nvidia-ctk || dpkg -l nvidia-container-toolkit 2>/dev/null | grep -q '^ii'"]
[component.install]
kind = "script"
script = '''
set -e
curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed "s#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g" | sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list >/dev/null
sudo apt-get update -y
sudo apt-get install -y nvidia-container-toolkit
sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml || true
'''
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "command -v nvidia-ctk >/dev/null && [ -f /etc/cdi/nvidia.yaml ]"]
[component.fix]
kind = "command"
needs_sudo = true
command = "nvidia-ctk"
args = ["cdi", "generate", "--output=/etc/cdi/nvidia.yaml"]
[component.remove]
kind = "command"
needs_sudo = true
command = "apt-get"
args = ["remove", "-y", "nvidia-container-toolkit"]
# Declarative system-scope wiring: the apt repo (.list + armored keyring) and the
# generated CDI spec. reset reverts them in the safe order + backs up first.
[[component.wiring.apt_repos]]
list_file = "nvidia-container-toolkit.list"
list_line = "deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /"
keyring_path = "/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg"
keyring_url = "https://nvidia.github.io/libnvidia-container/gpgkey"
dearmor = true
[[component.wiring.cdi_specs]]
output = "/etc/cdi/nvidia.yaml"


[[component]]
id = "pytorch-venv"
name = "PyTorch cu132 (isolated venv)"
description = "torch+torchvision cu132 in ~/.venvs/torch (bundles its own CUDA runtime)."
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "[ -x \"$HOME/.venvs/torch/bin/python\" ] && \"$HOME/.venvs/torch/bin/python\" -c 'import torch' 2>/dev/null"]
[component.install]
kind = "script"
script = '''
set -e
python3 -m venv "$HOME/.venvs/torch"
"$HOME/.venvs/torch/bin/pip" install --upgrade pip
"$HOME/.venvs/torch/bin/pip" install torch torchvision --index-url https://download.pytorch.org/whl/cu132
'''
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "\"$HOME/.venvs/torch/bin/python\" -c 'import torch; print(torch.__version__)'"]
[component.fix]
kind = "script"
script = "\"$HOME/.venvs/torch/bin/pip\" install --upgrade --force-reinstall torch torchvision --index-url https://download.pytorch.org/whl/cu132"
[component.remove]
kind = "command"
command = "bash"
args = ["-lc", "rm -rf \"$HOME/.venvs/torch\""]


[[component]]
id = "gpu-verify-scripts"
name = "GPU smoke-test scripts"
description = "~/.local/bin/yazelix-gpu-verify.sh + launcher + post-reboot one-shot autostart. install/fix REGENERATE them from the shipped yazelix-gpu-verify-install.sh (declarative port of yazelix-setup.sh 3f); detect/verify/remove unchanged. GPU-gated (no-op on a non-NVIDIA box)."
requires = ["nvidia-open", "pytorch-venv", "cuda-oxide", "nvidia-container-toolkit"]
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "[ -x \"$HOME/.local/bin/yazelix-gpu-verify.sh\" ]"]
# install/fix regenerate the smoke-test + launcher + autostart from the shipped
# installer (port of yazelix-setup.sh 3f). The installer self-gates on lspci nvidia.
[component.install]
kind = "shipped_script"
path = "/usr/local/bin/yazelix-gpu-verify-install.sh"
[component.fix]
kind = "shipped_script"
path = "/usr/local/bin/yazelix-gpu-verify-install.sh"
# verify runs the shipped smoke test with $HOME expanded (ShippedScript paths are
# NOT shell-expanded, so this is a Command hook); </dev/null answers its final read.
[component.verify]
kind = "command"
command = "bash"
args = ["-lc", "\"$HOME/.local/bin/yazelix-gpu-verify.sh\" </dev/null"]
[component.remove]
kind = "command"
command = "bash"
args = ["-lc", "rm -f \"$HOME/.local/bin/yazelix-gpu-verify.sh\" \"$HOME/.local/bin/yazelix-gpu-verify-launch.sh\" \"$HOME/.config/autostart/yazelix-gpu-verify.desktop\""]


# Group/meta: the whole GPU stack in dependency order. Skips on a non-NVIDIA box.
[[component]]
id = "group-gpu-stack"
name = "Full GPU stack"
description = "Meta: repo + toolkit + driver + llvm + cuda-oxide + container toolkit + torch + verify."
requires = ["nvidia-cuda-repo", "cuda-toolkit", "nvidia-open", "llvm-clang", "rust-nightly-cuda-oxide", "cuda-oxide", "nvidia-container-toolkit", "pytorch-venv", "gpu-verify-scripts"]
gpu_required = true
[component.detect]
kind = "command"
command = "bash"
args = ["-lc", "command -v nvcc >/dev/null && command -v nvidia-smi >/dev/null && command -v cargo-oxide >/dev/null"]
